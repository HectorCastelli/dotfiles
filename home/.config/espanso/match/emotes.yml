matches:
  - trigger: ":shrug"
    replace: "¯\\_(ツ)_/¯"
  - trigger: ":tableflip"
    replace: "(╯°□°）╯︵ ┻━┻"
  - trigger: ":tablefix"
    replace: "┬─┬ノ( º _ ºノ)"
  - trigger: ":info"
    replace: "ℹ️"
  - trigger: ":warn"
    replace: "⚠️"
  - trigger: ":danger"
    replace: "☢️"
  - trigger: ":bomb"
    replace: "💣"
  - trigger: ":party"
    replace: "🎉"
  - trigger: ":check"
    replace: "✅"
  - trigger: ":hope"
    replace: "🤞"
  - trigger: ":peace"
    replace: "✌️"